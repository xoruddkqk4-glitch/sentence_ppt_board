<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentence Presentation Board</title>
  <meta name="description" content="영어 지문을 문장 성분별 발표 화면으로 보여주는 교실용 앱">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app" class="app-shell" data-mode="input" data-theme="light">
    <header class="app-header">
      <div>
        <p class="eyebrow">English Sentence Board</p>
        <h1>문장 성분 발표 보드</h1>
      </div>
      <div class="header-actions" aria-label="전체 설정">
        <label class="control-inline">
          <span>테마</span>
          <select id="themeSelect" aria-label="테마 선택">
            <option value="light">밝게</option>
            <option value="dark">어둡게</option>
          </select>
        </label>
      </div>
    </header>

    <main>
      <section id="inputView" class="view input-view" aria-labelledby="inputTitle">
        <div class="input-layout">
          <div class="intro-panel">
            <p class="step-label">1단계</p>
            <h2 id="inputTitle">영어 지문을 붙여넣으세요</h2>
            <p class="helper-text">문장을 자동으로 나눈 뒤, 주요소와 종요소 분석 초안을 만듭니다.</p>
            <ul class="feature-list">
              <li>주요소: 주어, 동사, 보어, 목적어</li>
              <li>종요소: 형용사어, 부사어</li>
              <li>분석이 틀리면 드래그앤드롭으로 수정</li>
            </ul>
          </div>

          <form id="passageForm" class="passage-panel">
            <label for="passageInput">수업 지문</label>
            <textarea id="passageInput" rows="12" placeholder="예: The young students read the story carefully. They were extremely excited about the new lesson."></textarea>
            <p id="inputMessage" class="message" aria-live="polite"></p>
            <div class="button-row">
              <button class="button secondary" type="button" id="sampleButton">샘플 넣기</button>
              <button class="button secondary" type="button" id="clearButton">초기화</button>
              <button class="button secondary" type="button" id="inputExportTxtButton">TXT 저장</button>
              <button class="button secondary" type="button" id="inputImportButton">TXT 불러오기</button>
              <button class="button primary" type="submit">발표 준비</button>
            </div>
          </form>
        </div>
      </section>

      <section id="editView" class="view edit-view hidden" aria-labelledby="editTitle">
        <div class="toolbar">
          <div>
            <p class="step-label">2단계</p>
            <h2 id="editTitle">분석 결과 수정</h2>
          </div>
          <div class="toolbar-actions">
            <button class="button secondary" type="button" id="backToInputButton">입력 수정</button>
            <button class="button secondary" type="button" id="exportTxtButton">TXT 저장</button>
            <button class="button secondary" type="button" id="editImportButton">TXT 불러오기</button>
            <button class="button primary" type="button" id="startPresentButton">발표 시작</button>
          </div>
        </div>

        <div class="sentence-meta">
          <span id="editProgress" class="progress-badge">0 / 0</span>
          <p id="sourceSentence" class="source-sentence"></p>
        </div>

        <div class="edit-board" aria-label="문장 성분 수정 영역">
          <section class="lane-panel">
            <div class="lane-heading">
              <h3>주요소</h3>
              <span>주어 · 동사 · 보어 · 목적어</span>
            </div>
            <div id="majorEditLane" class="component-lane edit-lane" data-lane="major" aria-label="주요소 드롭 영역"></div>
          </section>

          <section class="lane-panel">
            <div class="lane-heading">
              <h3>종요소</h3>
              <span>형용사어 · 부사어</span>
            </div>
            <div id="minorEditLane" class="component-lane edit-lane" data-lane="minor" aria-label="종요소 드롭 영역"></div>
          </section>
        </div>

        <div class="nav-row">
          <button class="button secondary" type="button" id="editFirstButton">처음</button>
          <button class="button secondary" type="button" id="editPrevButton">이전</button>
          <button class="button secondary" type="button" id="editNextButton">다음</button>
          <button class="button secondary" type="button" id="editLastButton">마지막</button>
        </div>
      </section>

      <section id="presentView" class="view present-view hidden" aria-labelledby="presentTitle">
        <div class="present-topbar">
          <span id="presentProgress" class="progress-badge">0 / 0</span>
          <div class="color-legend" aria-label="문장 성분 색상 범례">
            <span><i class="legend-dot role-subject"></i>주어</span>
            <span><i class="legend-dot role-verb"></i>동사</span>
            <span><i class="legend-dot role-object"></i>목적어</span>
            <span><i class="legend-dot role-complement"></i>보어</span>
            <span><i class="legend-dot role-minor"></i>종요소</span>
          </div>
          <div class="present-actions">
            <button class="button secondary compact" type="button" id="returnEditButton">수정</button>
            <button class="button secondary compact" type="button" id="presentSaveTxtButton">TXT 저장</button>
            <button class="button secondary compact" type="button" id="returnInputButton">첫화면</button>
          </div>
        </div>

        <h2 id="presentTitle" class="sr-only">학생 발표 화면</h2>

        <div class="presentation-stage">
          <div id="majorPresentLane" class="component-lane present-lane major-lane" aria-label="주요소 줄"></div>
          <div id="minorAnchorLane" class="minor-anchor-lane" aria-hidden="true"></div>
          <div id="minorPresentLane" class="present-lane minor-lane" aria-label="종요소 줄"></div>
          <p id="emptyMinorNote" class="empty-note hidden">종요소 없음</p>
        </div>

        <div class="present-nav">
          <button class="button secondary large" type="button" id="presentPrevButton">이전</button>
          <button class="button primary large" type="button" id="presentNextButton">다음</button>
          <button class="button secondary large final-action hidden" type="button" id="presentHomeButton">첫화면</button>
          <button class="button secondary large final-action hidden" type="button" id="screenOffButton">화면 끄기</button>
        </div>
      </section>
    </main>

    <div id="screenOffOverlay" class="screen-off-overlay hidden" role="dialog" aria-modal="true" aria-label="화면 끄기">
      <button class="screen-on-button" type="button" id="screenOnButton">화면 켜기</button>
    </div>
  </div>

  <input id="analysisFileInput" type="file" accept=".txt,text/plain" hidden>
  <script src="js/main.js"></script>
</body>
</html>
